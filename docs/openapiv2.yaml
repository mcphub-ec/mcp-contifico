                $ref: "#/components/schemas/Stock"
  
  /api/v2/movimiento-inventario/:
    get:
      tags:
        - Movimientos de Inventario
      description: |-
        > GET https://api.contifico.com/sistema/api/v2/movimiento-inventario/

        Devuelve un listado de los movimientos de inventario.


        | Parámetro         | Tipo     | Longitud | Descripción                                                                 |
        |-------------------|:--------:|---------:|-----------------------------------------------------------------------------|
        | codigo            | varchar  |       16 | Código del movimiento de inventario.                                        |
        | bodega_id         | varchar  |       16 | Identificador de la bodega en el sistema.                                   |
        | tipo              | varchar  |        3 | Tipo de movimiento de inventario (ING:ingreso, EGR:egreso, TRA:traslado, AJU:ajuste de costo) |
        | fecha             | date     |        - | Fecha del movimiento de inventario (dd/mm/aaaa)                             |
        | generar_asiento   | boolean  |        - | Indica si el movimiento se marcó para generar un asiento.                   |
        | pos               | varchar  |       16 | Identificador del punto de venta desde el que se registró el movimiento.    |
        | detalles          | objeto   |        - | Objeto contenedor de los detalles del movimiento.                           |
        | producto_id       | varchar  |       16 | Identificador del producto en el sistema.                                   |
        | edicion           | boolean  |        - | Campo para módulo específico.                                               |
        | precio            | decimal  |       13 | Precio del producto en el movimiento (7 int, 6 decimal) max.                |
        | cantidad          | decimal  |       13 | Indica la cantidad del producto en el movimiento (7 int, 6 decimal) max.    |
        | maneja_venta      | boolean  |        - | Campo para módulo específico.                                               |
        | descripcion       | text     |        - | Descripción del movimiento.                                                 |
        | total             | decimal  |       10 | Valor total del movimiento (8 int, 2 decimal) max.                          |
        | estado            | varchar  |        1 | Estado del movimiento de inventario (G:generado, P:pendiente).              |
        | id                | varchar  |       16 | Identificador del movimiento en el sistema.                                 |
        | bodega_destino_id | varchar  |       16 | Identificador de la bodega destino del movimiento en el sistema.            |
        | codigo_interno    | varchar  |        - | Campo para módulo específico.                                               |
        | cuenta_id         | varchar  |        16| Id de la cuenta contable.                                                   |
        | proyecto          | varchar  |        16| Proyecto.                                                                   |

      operationId: Consulta
      parameters:
        - in: query
          name: fecha_inicial
          description: Consultar movimientos por rango de fecha.
          schema: 
            type: date
        - in: query
          name: fecha_final
          description: Consultar movimientos por rango de fecha
          schema: 
            type: date
        - in: query
          name: estado
          description: G:generado, P:pendiente
          schema: 
            type: string
        - in: query
          name: tipo
          description: ING:ingreso EGR:egreso, TRA:traslado, AJU:ajuste de costo
          schema: 
            type: string
        - in: query
          name: bodega_id
          description: Id de la bodega del movimiento
          schema: 
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovimientoInventario"      
    post:
      tags:
        - Movimientos de Inventario
      description: |-
        Se utiliza esta URL para la creación de ingresos, egresos y traslados de inventario

        > POST https://api.contifico.com/sistema/api/v2/movimiento-inventario/

        | Parámetro         | Tipo     | Longitud | Descripción                                                                 | Obligatorio |
        |-------------------|:--------:|---------:|-----------------------------------------------------------------------------|:-----------:|
        | codigo            | varchar  |       16 | Código del movimiento de inventario.                                        | No          |
        | bodega_id         | varchar  |       16 | Identificador de la bodega en el sistema.                                   | Si          |
        | tipo              | varchar  |        3 | Tipo de movimiento de inventario (ING:ingreso, EGR:egreso, TRA:traslado, AJU:ajuste de costo) | Si |
        | fecha             | date     |        - | Fecha del movimiento de inventario (dd/mm/aaaa)                             | Si          |
        | generar_asiento   | boolean  |        - | Indica si el movimiento se marcó para generar un asiento.                   | No          |
        | pos               | varchar  |       16 | Identificador del punto de venta desde el que se registró el movimiento. (Campo obligatorio para movimientos de tipo TRA) | Opcional    |
        | detalles          | objeto   |        - | Objeto contenedor de los detalles del movimiento.                           | Si          |
        | producto_id       | varchar  |       16 | Identificador del producto en el sistema.                                   | Si          |
        | edicion           | boolean  |        - | Campo para módulo específico.                                               | No          |
        | precio            | decimal  |       13 | Precio del producto en el movimiento. (Obligatorio para movimientos de tipo ING) (7 int, 6 decimal) max. | Opcional    |
        | cantidad          | decimal  |       13 | Indica la cantidad del producto en el movimiento (7 int, 6 decimal) max.    | Si          |
        | maneja_venta      | boolean  |        - | Campo para módulo específico.                                               | No          |
        | descripcion       | text     |        - | Descripción del movimiento.                                                 | Si          |
        | bodega_destino_id | varchar  |       16 | Identificador de la bodega destino del movimiento en el sistema. (Campo obligatorio para movimientos de tipo TRA) | Opcional    |
        | codigo_interno    | varchar  |        - | Campo para módulo específico.                                               | No          |

      operationId: Creación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovimientoInventario'
            examples:
              ingreso:
                $ref: '#/components/examples/ingreso'
              egreso:
                $ref: '#/components/examples/egreso'
              traslado:
                $ref: '#/components/examples/traslado'
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovimientoInventario" 

