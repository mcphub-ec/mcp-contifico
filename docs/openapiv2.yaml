  /api/v2/documento/:
    get:
      tags:
        - Documento
      description: |-
        Para obtener todos los documentos de la cuenta hacemos uso del endpoint:

        > GET https://api.contifico.com/sistema/api/v2/documento/

        | Parámetro              | Tipo              | Longitud | Descripción                                                                 |
        |------------------------|:-----------------:|---------:|-----------------------------------------------------------------------------|
        | iva                    | SmallIntegerField |        - | Valor de porcentaje de IVA que tiene el producto                            |
        | tarjeta_consumo_id     | varchar           |       16 | Identificador de la tarjeta de consumo en el sistema.                       |
        | vendedor               | objeto            |        - | Objeto de la persona vendedor.                                              |
        | pos                    | varchar           |       36 | API Token del POS.                                                          |
        | vendedor_id            | varchar           |       16 | Identificador de la persona vendedor en el sistema.                         |
        | logistica              | boolean           |        1 | Indicador si el documento está marcado para logística (Módulo Adicional).   |
        | subtotal_0             | decimal           |       10 | Representa el valor subtotal.                                               |
        | ice                    | decimal           |       10 | Representa el valor del ICE del documento.                                  |
        | descripcion            | text              |        - | Explicación del documento.                                                  |
        | total                  | decimal           |       13 | Valor total del movimiento.                                                 |
        | id                     | varchar           |       16 | Identificador del documento en el sistema.                                  |
        | subtotal_12            | decimal           |       10 | Representa el valor subtotal del IVA del documento.                         |
        | servicio               | decimal           |       13 | Representa el valor del porcentaje de servicio del documento.               |
        | detalles               | objeto            |        - | Objeto contenedor de los ítems a facturar del documento.                    |
        | producto_id            | varchar           |       16 | Identificador del producto en el sistema.                                   |
        | cantidad               | decimal           |       20 | Indica la cantidad del producto en el movimiento (14 int, 6 decimal) max.   |
        | precio                 | decimal           |       13 | Valor del producto en específico.                                           |
        | porcentaje_iva         | SmallIntegerField |        - | Valor de porcentaje de IVA que tiene el producto.                           |
        | porcentaje_descuento   | decimal           |       10 | Representa el valor subtotal del IVA del documento.                         |
        | base_cero              | decimal           |       10 | Representa el valor del producto si grava 0% IVA.                           |
        | base_gravable          | decimal           |       10 | Representa el valor del producto si grava IVA.                              |
        | base_no_gravable       | decimal           |       10 | Representa el valor del producto si no grava IVA.                           |
        | porcentaje_ice         | SmallIntegerField |        - | Representa el valor porcentual de ICE que grava el producto.                |
        | valor_ice              | decimal           |       10 | Representa el valor entero de ICE que grava el producto.                    |
        | irbpnr                 | decimal           |       10 | Representa el valor de IRBPNR del producto.                                 |
        | referencia             | varchar           |      300 | Dato adicional de la factura.                                               |
        | saldo_anticipo         | decimal           |       10 | Valor del producto en específico.                                           |
        | tipo_domicilio         | varchar           |        2 | Campo para asociación de delivery del documento (UB:uber, GL:glovo). (Módulo Adicional) |
        | autorizacion           | varchar           |       49 | Número de autorización del documento.                                       |
        | hora_evento            | time              |        - | Representa el valor del producto si grava 0% IVA.                           |
        | fecha_creacion         | date              |        - | Fecha de creación del documento. (dd/mm/aaaa)                               |
        | cobros                 | objeto            |        - | Objeto contenedor de los cobros del documento.                              |
        | forma_cobro            | varchar           |       10 | Tipo de documento a aplicar el cobro o pago de la transacción.              |
        | numero_comprobante     | varchar           |       15 | Secuencia única que identifica la transacción.                              |
        | caja_id                | varchar           |       16 | Identificador de la caja desde la cual se realiza la transacción.           |
        | monto                  | decimal           |       10 | Valor total del documento detalle relacionado.                              |
        | numero_tarjeta         | varchar           |       10 | Número de tarjeta bancaria supereasy (Módulo adicional).                    |
        | fecha                  | date              |        - | Fecha que se realiza la transacción. (dd/mm/aaaa)                           |
        | nombre_tarjeta         | varchar           |      300 | Nombre de tarjeta bancaria supereasy (Módulo adicional).                    |
        | tipo_banco             | char              |      300 | Nombre del banco supereasy (Módulo adicional).                              |
        | cuenta_bancaria_id     | varchar           |       16 | Identificador de la cuenta bancaria en el sistema.                          |
        | bin_tarjeta            | varchar           |       10 | Número de tarjeta bancaria supereasy (Módulo adicional).                    |
        | monto_propina          | decimal           |       10 | Representa el valor de la propina por un servicio.                          |
        | numero_cheque          | varchar           |       15 | Número de cheque en la transacción.                                         |
        | fecha_cheque           | date              |        - | Fecha del cheque. (dd/mm/aaaa)                                              |
        | tipo_ping              | varchar           |        1 | Tipo de transacción con TC (D:datafast, M:medianet, E:dataexpress, P:placetopay, A:alignet). |
        | id                     | varchar           |       16 | Identificador del cobro en el sistema.                                      |
        | tipo_descuento         | varchar           |        1 | Identificador del tipo de descuento asignado al documento (P:porcentual, U:unitario). |
        | orden_domicilio_id     | varchar           |       16 | Id de la orden de delivery (Módulo adicional).                              |
