        | lead_time                  | int                | -        | Tiempo estimado para recepción de producto desde su solicitud.              |
        | cantidad_stock             | varchar            | 16       | Stock del producto.                                                         |
        | unidad                     | varchar            | 16       | Id de la unidad del producto.                                               |
        | codigo_auxiliar            | varchar            | 25       | Codigo auxiliar del producto.                                               |
        | porcentaje_ice             | decimal            | 5        | Porcentaje ICE (3 int, 2 decimal)max.                                       |
        | valor_ice                  | decimal            | 5        | Valor ICE (3 int, 2 decimal)max.                                            |
        | campo_catalogo             | varchar            | 200      | Texto adicional utilizado para mostrar en los catalagos de productos.       |
        | maneja_nombremanual        | boolean            | 1        | Indica si el producto maneja nombre manual                                  |
        | porcentaje_servicio        | boolean            | 1        | Indica si el producto maneja porcentaje de servicio                                          |

      operationId: Consulta
      parameters:
        - in: query 
          name: modificados_desde_fecha
          description: Filtra productos desde la fecha del último cambio.
          schema:
            type: date
        - in: query 
          name: fecha_inicial
          description: Filtro de fecha inicial de la fecha de último cambio.
          schema:
            type: date
        - in: query 
          name: fecha_final
          description: Filtro de fecha final de la fecha de último cambio.
          schema:
            type: date
        - in: query 
          name: filtro
          description: Filtro que puede contener nombre o código del producto.
          schema:
            type: string
        - in: query 
          name: page
          description: Consultar productos por página, se envía el parámetro page y el número de la página, y esto retorna 100 items.
          schema:
            type: string
        - in: query 
          name: estado
          description: Consultar productos por estado (A=activo, I=inactivo).
          schema:
            type: string
        - in: query 
          name: categoria_id
          description: Identificador de la categoría.
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Producto" 
