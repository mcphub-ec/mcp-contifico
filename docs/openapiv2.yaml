openapi: 3.0.4
info:
  title: Documentacion API V2
  description: |-
    Contífico usa una clave de acceso para sus servicios (API Key), para obtenerla debes tener una cuenta en contífico y solicitarla por soporte al cliente. 
    Esta clave deberá ser agregada y enviada como parámetro en el header **AUTHORIZATION** en cada servicio que se consuma. Un ejemplo:
    >
    > Authorization: SECRETKEY
    >
    **SECRETKEY** debe ser reemplazado con el **API_KEY** proporcionado por contifico.

  version: v2
servers:
  - url: https://api.contifico.com/sistema
tags:
  - name: Asiento
  - name: Persona
  - name: Categoria
  - name: Bodega
  - name: Producto
  - name: Documento
  - name: Cobros
  - name: Cuentas Bancarias
  - name: Formas de Pago
  - name: Parametros
  - name: Movimientos de Inventario
  - name: Unidad

paths:
  /api/v2/contabilidad/asiento/:
    get:
      tags:
        - Asiento
      description: |-
        Devuelve un listado de asientos con su respectivo detalle.

        > GET https://api.contifico.com/sistema/api/v2/contabilidad/asiento/
        

        |    Parámetro    |   Tipo   | Longitud |                          Descripción                          |
        |-----------------|----------|----------|---------------------------------------------------------------|
        |     detalles    |  objeto  | 	  -     | Cuentas involucradas                                          |
        |    cuenta_id    |  varchar |	  16  	| Identificador de la cuenta que se va a utilizar en el asiento |
        | centro_costo_id |  varchar |	  16 	  | Identificador del centro de costo                             |
        |      tipo 	    |   char   |    1 	  | Tipo de detalle D:Debe H:Haber                                |
        |      valor    	|  decimal | 	  12 	  | Valor del detalle, (10 int, 2 decimal)max.                    |
        |      glosa      |	longtext | 	    	  | Glosa del asiento                                             |
        |      fecha      |	  char   |    10    |	Fecha de la transacción formato "dd/mm/yyyy"                  |
        |       id 	      |   char	 |    16 	  | Identificador del asiento consultado                          |

      operationId: Consulta
      parameters:
        - name: page
          in: query
          description: Número de página
          required: false
          schema:
            type: string
        - in: query 
          name: fecha_inicial
          description: Fecha inicial con el formato DD/MM/AAAA (donde DD es el día, MM es el mes y AAAA es el año).
          schema:
            type: date
        - in: query 
          name: fecha_final
          description: Fecha final con el formato DD/MM/AAAA (donde DD es el día, MM es el mes y AAAA es el año).
          schema:
            type: date
        - in: query 
          name: centro_costo
          description: Filtro de centro de costo (id_integracion).
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asiento"

  /api/v2/contabilidad/asiento/{id}:
    get:
      tags:
        - Asiento
      description: |-
        Devuelve un asiento con su respectivo detalle y por el id solicitado.

        > GET https://api.contifico.com/sistema/api/v2/contabilidad/asiento/{id_integracion}
        

        |    Parámetro    |   Tipo   | Longitud |                          Descripción                          |
        |-----------------|----------|----------|---------------------------------------------------------------|
        |     detalles    |  objeto  | 	  -     | Cuentas involucradas                                          |
        |    cuenta_id    |  varchar |	  16  	| Identificador de la cuenta que se va a utilizar en el asiento |
        | centro_costo_id |  varchar |	  16 	  | Identificador del centro de costo                             |
        |      tipo 	    |   char   |    1 	  | Tipo de detalle D:Debe H:Haber                                |
        |      valor    	|  decimal | 	  12 	  | Valor del detalle, (10 int, 2 decimal)max.                    |
        |      glosa      |	longtext | 	    	  | Glosa del asiento                                             |
        |      fecha      |	  char   |    10    |	Fecha de la transacción formato "dd/mm/yyyy"                  |
        |       id 	      |   char	 |    16 	  | Identificador del asiento consultado                          |

      operationId: Obtener un asiento
      parameters:
        - name: id_integracion
          in: path
          description: id_integracion del asiento
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asiento"

  /api/v2/persona/:
    get:
      tags:
        - Persona
      description: |-
        > GET https://api.contifico.com/sistema/api/v2/persona/

        Devuelve un listado con todas las personas creadas en el sistema


        |       Parámetro       |  Tipo   | Longitud |	                      Descripción                          |
        |-----------------------|---------|----------|-------------------------------------------------------------|
        |         id 	          | varchar |	    16   | Identificador de la cuenta en el sistema.                   |
        |  adicionales_cliente  | varchar |	   300 	 | Informacion adicional del cliente.                          |
        |  personaasociada_id   | varchar |	    16 	 | Identificador de la persona asociada a la persona actual.   |
        |       direccion       | varchar |    300   | Direccion de la persona.                                    |
        |       es_vendedor     | boolean |   	 1   | Rol vendedor de la persona.                                 |
        |          tipo 	      | varchar |      1 	 | Tipo de persona (N:Natural J:Juridica I:SinId P:Placa).     |
        |     razon_social  	  | varchar |	   300   | Razon social de la persona.                                 |
        |    nombre_comercial   | varchar |	   300   | Nombre comercial de la persona.                             |
        |    es_corporativo     | boolean |	    1 	 | Rol corporativo de la persona.                              |
        | porcentaje_descuento  | decimal |	    2 	 | Descuento de tipo cliente (2 decimales Max).                |
        |         origen        | varchar |	    3  	 | Tipo de POS desde el cual se registro.                      |
        |          ruc          | varchar |	    13   | Ruc de la persona.                                          |
        |    banco_codigo_id    | varchar |	   16 	 | Codigo de banco asociado a la persona.                      |
        |         email         | varchar |    50  	 | Correo de la persona.                                       |
        |       es_cliente   	  | boolean |	    1    | Rol vendedor de la persona.                                 |
        | adicionales_proveedor |	varchar |	   300 	 | Informacion adicional del proveedor.                        |
        |     numero_tarjeta    |	varchar |	   200 	 | Numero de tarjeta de la persona.                            |
        |      es_extranjero    |	boolean |	    1 	 | Verificador de personas extranjeras.                        |
        |       es_empleado     | boolean |	    1 	 | Rol empleado de la persona.                                 |
        |       es_proveedor 	  | boolean |	    1 	 | Rol proveedor de la persona.                                |
        |       aplicar_cupo    |	boolean |	    1 	 | Verificador si la persona tiene un cupo maximo como cliente.|
        |       telefonos      	| varchar |	   50 	 | Telefono de la persona.                                     |
        |      tipo_cuenta 	    | varchar |	    2 	 | tipo de la cuenta contable asociada.                        |
        |          placa      	| varchar |	   13 	 | Placa de la persona si es de tipo placa.                    |
        |         cedula 	      | varchar |	   10 	 | Cedula de la persona.                                       |
        |       id_categoria 	  | varchar |	   16 	 | Identificador de la categoria persona en el sistema.        |
        |    categoria_nombre   |	varchar |	   40 	 | Nombre de la categoria asociada a la persona.               |
        |   fecha_modificacion  |	  date  |	    -    | Fecha de modificación asociada a la persona.                |
        |         sueldo        |	decimal |	   10 	 | Sueldo asociado a la persona. (8 int, 2 decimal)max         |
        |      dias_credito     |	varchar |	   40 	 | Días de crédito asociado a la persona.                      |
        |      cupo_credito     |	varchar |	   40 	 | Cupo de crédito asociado a la persona.                      |
        |    vendedor_asignado  |	  obj   |	    -    | Vendedor asignado a la persona.                             |

      operationId: Consulta
      parameters:
        - in: query
          name: search
          description: Busca personas en los campos 'razon_social', 'nombre_comercial', 'cedula' y 'ruc' que coincidan con el valor enviado.
          schema:
            type: string
        - in: query 
          name: modificados_desde_fecha
          description: Busca personas con una fecha de modificación igual y mayor de la fecha enviada.
            Utilice el formato "AAAA-MM-DD"
          schema:
            type: date
        - in: query 
          name: estado
          description: Busca personas según el estado:A=activo, I=inactivo.
          schema:
            type: string
        - in: query 
          name: fecha_inicial
          description: Filtro de fecha inicial. Debe utilizar el formato AAAA-MM-DD.
          schema:
            type: date
        - in: query 
          name: fecha_final
          description: Filtro de fecha final. Debe utilizar el formato AAAA-MM-DD.
          schema:
            type: date
        - in: query 
          name: es_proveedor
          description: Filtro es_proveedor. Debe utilizar 1=true, 0=false.
          schema:
            type: boolean
        - in: query 
          name: es_cliente
          description: Filtro es_ cliente. Debe utilizar 1=true, 0=false.
          schema:
            type: boolean
        - in: query 
          name: tipo
          description: Consultar personas por tipo (N=Natural, J=Juridico, I=Sin RUC o cédula, P=Placa)
          schema:
            type: string
        - in: query 
          name: page
          description: Consulta personas con el page indicado.
          schema:
            type: string
        - in: query 
          name: categoria_id
          description: Identificador de la categoría persona.
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Persona"
        '500':
          description: Error en el servidor
    post:
      tags: 
        - Persona
      description: |-
        Para crear una persona se debe de hacer uso de la url:

        > POST https://api.contifico.com/sistema/api/v2/persona/?pos={api_token}


        |      Parámetro      |	  Tipo  |	Longitud |	                           Descripción                                |	Obligatorio |
        |---------------------|---------|----------|------------------------------------------------------------------------|-------------|
        | adicionales_cliente |	varchar |	   300   |	Informacion adicional del cliente (acepta null)                       |	     No     |
        | personaasociada_id  |	varchar |	    16   |	Identificador de la persona asociada a la persona actual (acepta null)|	     No     |
        |      direccion      |	varchar |	   300   |	Direccion de la persona                                               |	     No     |
        |      es_vendedor    | boolean |	    1    |	Rol vendedor de la persona                                            |	     No     |
        |         tipo        |	varchar |	    1    |	Tipo de persona (N:Natural J:Juridica I:SinId P:Placa)                |	     Si     |
        |     razon_social    |	varchar |	   300   |	Razon social de la persona                                            |	     Si     |
        |   nombre_comercial  |	varchar |	   300   |	Nombre comercial de la persona                                        |	  Opcional  |
        |   es_corporativo    |	boolean |	    1    |	Rol corporativo de la persona                                         |	     No     |
        | porcentaje_descuento| decimal |	    2    | 	Descuento de tipo cliente                                             |	     No     |
        |        origen       |	varchar |	    3    |	Tipo de POS desde el cual se registro (acepta null)                   |	     No     |
        |          ruc        |	varchar |	   13    |	Ruc de la persona                                                     |	  Opcional  |
        |   banco_codigo_id   |	varchar |	   16    |	Codigo de banco asociado a la persona (acepta null)                   |	     No     |
        |         email       |	varchar |	   50    |  Correo de la persona                                                  |	     No     |
        |      es_cliente     |	boolean |	    1    |	Rol vendedor de la persona                                            |	     Si     |
        |adicionales_proveedor|	varchar |	   300   |	Informacion adicional del proveedor                                   |	     No     |
        |   numero_tarjeta    |	varchar |	   200   |	Numero de tarjeta de la persona                                       |	     No     |
        |    es_extranjero    |	boolean |	    1    |	Verificador de personas extranjeras                                   |	     No     |
        |      es_empleado    |	boolean |	    1    |	Rol empleado de la persona                                            | 	   No     |
        |     es_proveedor    |	boolean |	    1    |	Rol proveedor de la persona                                           |	     Si     |
        |     aplicar_cupo    |	boolean |	    1    |	Verificador si la persona tiene un cupo maximo como cliente           |	     No     |
        |       telefonos     |	varchar |	   50    |	Telefono de la persona 	                                              |      No     |
        |      tipo_cuenta    |	varchar |	    2    |	tipo de la cuenta contable asociada                                   |	     No     |
        |         placa       |	varchar |	   13    |	Placa de la persona si es de tipo placa                               |	  Opcional  |
        |        cedula       |	varchar |	   10    |	Cédula de la persona                                                  |	     Si     |


        | Parámetro |	  Tipo  | Longitud |    	    Descripción        |
        |-----------|---------|----------|-----------------------------|
        |   token   |	varchar |	   16    | Token enviado por Contifico.|

        NOTA: Se debe de enviar en true al menos uno de los campos: “es_proveedor” o “es_cliente”.
        Los campos opcionales son obligatorios dependiendo del tipo de persona que se cree, 
        personas Juridicas requieren el envío del campo ruc.

      operationId: Creación
      parameters:
        - in: query
          name: pos
          description: Api Token del POS
          required: true
          schema:
              type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Persona"
            examples:
              natural:
                $ref: '#/components/examples/natural'
              naturalconRUC:
                $ref: '#/components/examples/naturalconRUC'
              juridica:
                $ref: '#/components/examples/juridica'
              juridicaconCedula:
                $ref: '#/components/examples/juridicaconCedula'
              extranjeroNatural:
                $ref: '#/components/examples/extranjeroNatural'
              extranjeroJuridico:
                $ref: '#/components/examples/extranjeroJuridico'
              sinID:
                $ref: '#/components/examples/sinID'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Persona"
        '500':
          description: Error en el servidor

  /api/v2/persona/{id_integracion}/:
    get:
      tags:
        - Persona
      description: |-
        > GET https://api.contifico.com/sistema/api/v2/persona/{id_integracion}/

        Devuelve una persona con el id solicitado.


        |       Parámetro       |  Tipo   | Longitud |	                      Descripción                          |
        |-----------------------|---------|----------|-------------------------------------------------------------|
        |         id 	          | varchar |	    16   | Identificador de la cuenta en el sistema.                   |
        |  adicionales_cliente  | varchar |	   300 	 | Informacion adicional del cliente.                          |
        |  personaasociada_id   | varchar |	    16 	 | Identificador de la persona asociada a la persona actual.   |
        |       direccion       | varchar |    300   | Direccion de la persona.                                    |
        |       es_vendedor     | boolean |   	 1   | Rol vendedor de la persona.                                 |
        |          tipo 	      | varchar |      1 	 | Tipo de persona (N:Natural J:Juridica I:SinId P:Placa).     |
        |     razon_social  	  | varchar |	   300   | Razon social de la persona.                                 |
        |    nombre_comercial   | varchar |	   300   | Nombre comercial de la persona.                             |
        |    es_corporativo     | boolean |	    1 	 | Rol corporativo de la persona.                              |
        | porcentaje_descuento  | decimal |	    2 	 | Descuento de tipo cliente (2 decimales Max).                |
        |         origen        | varchar |	    3  	 | Tipo de POS desde el cual se registro.                      |
        |          ruc          | varchar |	    13   | Ruc de la persona.                                          |
        |    banco_codigo_id    | varchar |	   16 	 | Codigo de banco asociado a la persona.                      |
        |         email         | varchar |    50  	 | Correo de la persona.                                       |
        |       es_cliente   	  | boolean |	    1    | Rol vendedor de la persona.                                 |
        | adicionales_proveedor |	varchar |	   300 	 | Informacion adicional del proveedor.                        |
        |     numero_tarjeta    |	varchar |	   200 	 | Numero de tarjeta de la persona.                            |
        |      es_extranjero    |	boolean |	    1 	 | Verificador de personas extranjeras.                        |
        |       es_empleado     | boolean |	    1 	 | Rol empleado de la persona.                                 |
        |       es_proveedor 	  | boolean |	    1 	 | Rol proveedor de la persona.                                |
        |       aplicar_cupo    |	boolean |	    1 	 | Verificador si la persona tiene un cupo maximo como cliente.|
        |       telefonos      	| varchar |	   50 	 | Telefono de la persona.                                     |
        |      tipo_cuenta 	    | varchar |	    2 	 | tipo de la cuenta contable asociada.                        |
        |          placa      	| varchar |	   13 	 | Placa de la persona si es de tipo placa.                    |
        |         cedula 	      | varchar |	   10 	 | Cedula de la persona.                                       |
        |       id_categoria 	  | varchar |	   16 	 | Identificador de la categoria persona en el sistema.        |
        |    categoria_nombre   |	varchar |	   40 	 | Nombre de la categoria asociada a la persona.               |
        |   fecha_modificacion  |	  date  |	    -    | Fecha de modificación asociada a la persona.                |
        |         sueldo        |	decimal |	   10 	 | Sueldo asociado a la persona. (8 int, 2 decimal)max         |
        |      dias_credito     |	varchar |	   40 	 | Días de crédito asociado a la persona.                      |
        |      cupo_credito     |	varchar |	   40 	 | Cupo de crédito asociado a la persona.                      |
        |    vendedor_asignado  |	  obj   |	    -    | Vendedor asignado a la persona.                             |

      operationId: Obtener una persona
      parameters:
        - in: path
          name: id_integracion
          description: id_integracion Persona
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Persona"           
        '500':
          description: Error en el servidor
          
    put:
      tags: 
        - Persona
      description: |-
        Para modificar una persona se debe de hacer uso de la url:

        > PUT https://api.contifico.com/sistema/api/v2/persona/{id}/?pos={api_token}


        |      Parámetro      |	  Tipo  |	Longitud |	                           Descripción                                |	Obligatorio |
        |---------------------|---------|----------|------------------------------------------------------------------------|-------------|
        | adicionales_cliente |	varchar |	   300   |	Informacion adicional del cliente (acepta null)                       |	     No     |
        | personaasociada_id  |	varchar |	    16   |	Identificador de la persona asociada a la persona actual (acepta null)|	     No     |
        |      direccion      |	varchar |	   300   |	Direccion de la persona                                               |	     No     |
        |      es_vendedor    | boolean |	    1    |	Rol vendedor de la persona                                            |	     No     |
        |         tipo        |	varchar |	    1    |	Tipo de persona (N:Natural J:Juridica I:SinId P:Placa)                |	     Si     |
        |     razon_social    |	varchar |	   300   |	Razon social de la persona                                            |	     Si     |
        |   nombre_comercial  |	varchar |	   300   |	Nombre comercial de la persona                                        |	  Opcional  |
        |   es_corporativo    |	boolean |	    1    |	Rol corporativo de la persona                                         |	     No     |
        | porcentaje_descuento| decimal |	    2    | 	Descuento de tipo cliente                                             |	     No     |
        |          ruc        |	varchar |	   13    |	Ruc de la persona                                                     |	  Opcional  |
        |   banco_codigo_id   |	varchar |	   16    |	Codigo de banco asociado a la persona (acepta null)                   |	     No     |
        |         email       |	varchar |	   50    |  Correo de la persona                                                  |	     No     |
        |      es_cliente     |	boolean |	    1    |	Rol vendedor de la persona                                            |	     Si     |
        |adicionales_proveedor|	varchar |	   300   |	Informacion adicional del proveedor                                   |	     No     |
        |   numero_tarjeta    |	varchar |	   200   |	Numero de tarjeta de la persona                                       |	     No     |
        |    es_extranjero    |	boolean |	    1    |	Verificador de personas extranjeras                                   |	     No     |
        |      es_empleado    |	boolean |	    1    |	Rol empleado de la persona                                            | 	   No     |
        |     es_proveedor    |	boolean |	    1    |	Rol proveedor de la persona                                           |	     Si     |
        |     aplicar_cupo    |	boolean |	    1    |	Verificador si la persona tiene un cupo maximo como cliente           |	     No     |
        |       telefonos     |	varchar |	   50    |	Telefono de la persona 	                                              |      No     |
        |      tipo_cuenta    |	varchar |	    2    |	tipo de la cuenta contable asociada                                   |	     No     |
        |         placa       |	varchar |	   13    |	Placa de la persona si es de tipo placa                               |	  Opcional  |
        |        cedula       |	varchar |	   10    |	Cédula de la persona                                                  |	     Si     |


        | Parámetro |	  Tipo  | Longitud |    	    Descripción        |
        |-----------|---------|----------|-----------------------------|
        |   token   |	varchar |	   16    | Token enviado por Contifico.|

      operationId: Actualización
      parameters:
        - in: path
          name: id_integracion
          description: id_integracion Persona
          required: true
          schema:
            type: string
        - in: query
          name: pos
          description: Api Token del POS.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Persona"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Persona"
        '500':
          description: Error en el servidor

  /api/v2/categoria/:
    get:
      tags:
        - Categoria
      description: |-
        > GET https://api.contifico.com/sistema/api/v2/categoria/

        Devuelve un listado con todas las categorías creadas en el sistema.

        |      Parámetro    |	  Tipo  |	Longitud |	                            Descripción                                          |
        |-------------------|---------|----------|-----------------------------------------------------------------------------------|
        |       nombre      |	varchar |	   300   |	Nombre de la categoría.                                                          |
        |         id        |	varchar |	    16   |	Identificador de la categoria en el sistema.                                     |

      operationId: Consulta
      parameters:
        - in: query
          name: tipo
          schema:
            type: string
            description: Tipo de la categoria. [Transaccional, Grupo].
        - in: query
          name: search_exact
          schema:
            type: string
            description: Filtra por nombre de la categoria.
        - in: query
          name: modificados_desde_fecha
          schema:
            type: date
            description: Filtra por fecha de modificación.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
    post:
      tags:
        - Categoria
      description: |-
        Para crear una categoría se debe de hacer uso de la url:

        > POST https://api.contifico.com/sistema/api/v2/categoria/


        |     Parámetro     |	  Tipo  |	Longitud |	                                Descripción                                      |	Obligatorio |
        |-------------------|---------|----------|-----------------------------------------------------------------------------------|--------------|
        |      nombre       |	varchar |	   300   |	Nombre de la categoría.                                                          |	    Si      |

      operationId: Creación
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Categoria"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"

  /api/v2/categoria/{id_integracion}/:
    get:
      tags:
        - Categoria
