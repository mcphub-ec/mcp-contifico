            application/json:
              schema:
                $ref: "#/components/schemas/CuentaBancaria"

  /api/v2/documento/{id_integracion}/forma_pago:
    get:
      tags:
        - Formas de Pago
      description: |-
        Consulta las formas de cobro/pago de un documento, ya sea tipo cliente o proveedor 

        > GET https://api.contifico.com/sistema/api/v2/documento/{id_integracion}/forma_pago

        | Parámetro  | Tipo    | Longitud | Descripción                             |
        |------------|---------|----------|-----------------------------------------|
        | forma_pago | varchar |       4  | Indica la forma que se realiza el pago. |
        | plazo      | integer |       -  | Tiempo días para el pago del Documento. |
        | unidad     | varchar |       2  | Unidad de tiempo del plazo para el pago.|
        | valor      | decimal |       10 | Valor final del pago. (8 int, 2 decimal)|

      operationId: Consulta
      parameters:
        - in: path
          name: id_integracion
          description: Id de integracion del documento
          required: true
          schema: 
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPago"

  /api/v2/empresa/parametros:
    get:
      tags:
        - Parametros
      description: |-
        Devuelve un listado de los parametros que tiene la empresa.

        > GET https://api.contifico.com/sistema/api/v2/empresa/parametros

        | Parámetro | Tipo    | Longitud | Descripción          |
        |-----------|---------|----------|----------------------|
        | nombre    | varchar |       4  | Nombre del parametro.|
        | tipo      | varchar |       -  | Tipo del parametro.  |
        | valor     | varchar |       10 | Valor del parametro. |

      operationId: Consulta 
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parametro"

  /api/v2/unidad/:
    get:
      tags:
        - Unidad
      description: |-
        Devuelve un listado con todas las unidades que existen.

        > GET https://api.contifico.com/sistema/api/v2/unidad/.

        | Parámetro | Tipo    | Longitud | Descripción          |
        |-----------|---------|----------|----------------------|
        | nombre    | varchar |      100 | Nombre de la unidad. |
        | id        | varchar |       16 | Id de la unidad.     |

      operationId: Consulta
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unidad"

  /api/v2/unidad/{id_integracion}:
    get:
      tags:
        - Unidad
      description: |-
        Devuelve una unidad con el id de integracion.

        > GET https://api.contifico.com/sistema/api/v2/unidad/{id_integracion}.

        | Parámetro | Tipo    | Longitud | Descripción          |
        |-----------|---------|----------|----------------------|
        | nombre    | varchar |      100 | Nombre de la unidad. |
        | id        | varchar |       16 | Id de la unidad.     |

      operationId: Obtener una unidad
      parameters:
        - in: path
          name: id_integracion
          description: Id de integracion de la unidad
          required: true
          schema: 
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unidad"

